<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bird Fighter 2X</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="wrap">
<div id="top">🐦 BIRD FIGHTER 2X 🐦</div>
<canvas id="game" width="960" height="540"></canvas>
<div id="hint">キック3段コンボ / 投げ / 必殺 / ガード反射 / ゲージMAXでガード＋必殺＝超必殺</div>
<div id="controls">
<div class="pad">
<button id="jump" data-key="w">↑<br>ジャンプ</button>
<button id="left" data-key="a">←</button>
<button id="guard" data-key="s">盾<br>ガード</button>
<button id="right" data-key="d">→</button>
</div>
<div class="actions">
<button id="start">▶ START</button>
<button id="throwBtn" data-key="f">投げ</button>
<button id="kick" data-key="g">キック</button>
<button id="special" data-key="h">必殺技</button>
</div>
</div>
</div>
<script src="game.js"></script>
</body>
</html>
